services:
  db:
    image: postgres:17
    container_name: canchatulcan_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: david5543
      POSTGRES_DB: canchatulcan
    ports:
      - "5432:5432"
    volumes:
      - canchatulcan_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: canchatulcan_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:david5543@db:5432/canchatulcan
    ports:
      - "5000:5000"
    volumes:
      - ./app/static/uploads:/app/app/static/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  canchatulcan_db_data:
